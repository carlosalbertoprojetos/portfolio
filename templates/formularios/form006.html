<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Formulário6</title>
  </head>
  <body>
    <h1>Exemplo de Formulário</h1>
    <form method="POST" autocomplete="on">
      <p>
        <label for="id_cor">Cor</label>
        <input type="color" name="cor" id="id_cor" value="#00ff00" />
      </p>

      <p>
        <label for="id_nivel">Nível de Satisfação</label>
        <input type="range" name="nivel" id="id_nivel" min="1" max="10" value="1" />
      </p>

      <!-- type="file" somente método POST -->
      <label for="id_foto">Foto do Perfil</label><br />
      <input type="file" name="foto" value="id_foto" />

      <p>
        <input type="submit" value="Enviar" />
        <input type="reset" value="Limpar" />
      </p>
    </form>
  </body>
</html>
