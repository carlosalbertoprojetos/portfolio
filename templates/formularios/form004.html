<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Formulário4</title>
  </head>
  <body>
    <h1>Exemplo de Formulário</h1>
    <form method="GET" autocomplete="on">
        <fieldset>
            <legend>:  Dados Pessoais  :</legend>
            <p>
                <label for="id_nome">Nome</label>
                <input type="text" name="nome" id="id_nome" required maxlength="30" placeholder="Nome completo" autocomplete="name" />
            </p>
            <p>
                <label for="id_email">E-mail</label>
                <input type="email" name="email" id="id_email" placeholder="E-mail"  autocomplete="email" required />
            </p>
            <p>
                <label for="id_tel">Telefone</label>
                <input type="tel" name="tel" id="id_tel" placeholder="(XX)XXXXX-XXXX"  autocomplete="tel" pattern="^\(\d{2}\)\d{4,5}-\d{4}" required/>
            </p>
        </fieldset>
        <p>
            <input type="submit" value="Enviar" />
            <input type="reset" value="Limpar" />
        </p>
    </form>
  </body>
</html>
