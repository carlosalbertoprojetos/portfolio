<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Formulário3</title>
    <style>
      * {
        font-family: Arial, Helvetica, sans-serif;
      }
    </style>
  </head>
  <body>
    <h1>Teste de Formulário</h1>
    <form method="GET" autocomplete="on">
      <p>
        <label for="id_nome">Nome</label>
        <input type="text" name="nome" id="id_nome" required maxlength="30" placeholder="Nome completo" autocomplete="name" />
      </p>
      <p>
        <label for="id_media">Média</label>
        <input type="number" name="media" id="id_media" min="0" max="10" placeholder="0 a 10" step="0.1" required />
      </p>
      <p>
        <label for="id_mes">Mês(Período Letivo)</label>
        <input type="month" name="mes" id="id_mes" required />
      </p>
      <p>
        <label for="id_dia">Dia</label>
        <input type="date" name="dia" id="id_dia" required />
      </p>
      <p>
        <label for="id_hora">Hora</label>
        <input type="time" name="hora" id="id_hora" required />
      </p>
      <p>
        <input type="submit" value="Enviar" />
        <input type="reset" value="Limpar" />
      </p>
    </form>
  </body>
</html>
